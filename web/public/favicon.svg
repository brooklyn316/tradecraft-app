<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#060a14"/>
  <!-- Candlestick left (bullish) -->
  <rect x="7" y="12" width="4" height="10" rx="0.8" fill="#4ade80"/>
  <line x1="9" y1="7" x2="9" y2="12" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9" y1="22" x2="9" y2="26" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Candlestick right (bearish) -->
  <rect x="14" y="10" width="4" height="8" rx="0.8" fill="#7dd3b0"/>
  <line x1="16" y1="6" x2="16" y2="10" stroke="#7dd3b0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="18" x2="16" y2="22" stroke="#7dd3b0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- TC text -->
  <text x="22" y="21" font-family="system-ui,sans-serif" font-weight="800" font-size="10" fill="#7dd3b0" text-anchor="middle">TC</text>
</svg>
